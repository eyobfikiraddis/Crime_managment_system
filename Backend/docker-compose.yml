services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ccms
      POSTGRES_USER: ccms_user
      POSTGRES_PASSWORD: ccms_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccms_user -d ccms"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ccms-network
    profiles: ["dev", "prod"]

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ccms-network
    profiles: ["dev", "prod"]

  backend:
    build: .
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request, json; resp=urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=2); data=json.load(resp); raise SystemExit(0 if data.get('status')=='healthy' else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ccms-network
    profiles: ["dev", "prod"]

networks:
  ccms-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
